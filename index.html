<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"

  <meta name="description" content="A modern, animated Connect Four game with AI opponent" />
  <meta name="theme-color" content="#2E5BFF" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="shortcut icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-512.png" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fourdotgame.netlify.app/" />
  <meta property="og:title" content="Connect Four" />
  <meta property="og:description"
    content="Play the classic strategy game with smooth animations, AI opponent, and a beautiful modern UI." />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Connect Four" />
  <meta name="twitter:description"
    content="Play the classic strategy game with smooth animations, AI opponent, and a beautiful modern UI." />
  <meta name="twitter:image" content="https://fourdotgame.netlify.app/og-image.png" />
  <meta name="twitter:image:alt" content="Connect Four - A modern strategy game" />

  <title>Connect Four</title>
  <style>
    /* Loading / Splash Screen */
    body {
      margin: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      transition: opacity 0.5s ease-out;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash .logo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    #splash .dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      animation: splash-bounce 1.4s ease-in-out infinite;
    }

    #splash .dot:nth-child(1) {
      background: #FF4560;
      animation-delay: 0s;
    }

    #splash .dot:nth-child(2) {
      background: #FFD028;
      animation-delay: 0.2s;
    }

    #splash .dot:nth-child(3) {
      background: #FFD028;
      animation-delay: 0.4s;
    }

    #splash .dot:nth-child(4) {
      background: #FF4560;
      animation-delay: 0.6s;
    }

    #splash .title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #FF4560, #FFD028);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    #splash .subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes splash-bounce {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(0.6);
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <!-- Splash / Loading Screen -->
  <div id="splash">
    <div class="logo-grid">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="title">Connect Four</div>
    <div class="subtitle">Loading...</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
